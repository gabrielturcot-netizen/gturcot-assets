<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Test transparence signature</title>
<style>
  body{margin:0;font-family:-apple-system,Arial,sans-serif;}
  .block{padding:30px 18px;}
  .lab{font-size:12px;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;opacity:.7;}
  .noir{background:#000000;color:#fff;}
  .charbon{background:#1a1a1a;color:#fff;}
  .blanc{background:#ffffff;color:#000;}
  .bleu{background:#1e3a5f;color:#fff;}
  .vert{background:#2f5d3a;color:#fff;}
  img{display:block;width:100%;max-width:360px;height:auto;border:0;}
</style>
</head>
<body>
  <div class="block noir"><div class="lab">Fond noir</div><img src="signature_gturcot_h.png" alt=""></div>
  <div class="block charbon"><div class="lab">Fond charbon (mode sombre)</div><img src="signature_gturcot_h.png" alt=""></div>
  <div class="block blanc"><div class="lab">Fond blanc (mode clair)</div><img src="signature_gturcot_h.png" alt=""></div>
  <div class="block bleu"><div class="lab">Fond bleu</div><img src="signature_gturcot_h.png" alt=""></div>
  <div class="block vert"><div class="lab">Fond vert</div><img src="signature_gturcot_h.png" alt=""></div>
</body>
</html>
